<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Movie</title>
    <link rel="stylesheet" href="edit.css" />
    <script src="edit.js" defer></script>
  </head>
  <body>
    <main>
      <h1>Edit Movie</h1>
      <form>
        <label for="imdbID">IMDb ID</label>
        <input id="imdbID" readonly />

        <label for="Title">Title</label>
        <input id="Title" required />

        <label for="Released">Released</label>
        <input id="Released" required />

        <label for="Runtime">Runtime</label>
        <input id="Runtime" type="number" required />

        <label for="Genres">Genres</label>
        <select id="Genres" multiple size="5">
          <option value="Animation">Animation</option>
          <option value="Adventure">Adventure</option>
          <option value="Comedy">Comedy</option>
          <option value="Fantasy">Fantasy</option>
          <option value="Action">Action</option>
          <option value="Mystery">Mystery</option>
          <option value="Sci-Fi">Sci-Fi</option>
          <option value="Drama">Drama</option>
        </select>

        <label for="Directors">Directors</label>
        <input id="Directors" required />

        <label for="Writers">Writers</label>
        <input id="Writers" required />

        <label for="Actors">Actors</label>
        <input id="Actors" required />

        <label for="Plot">Plot</label>
        <textarea id="Plot" rows="4" required></textarea>

        <label for="Poster">Poster URL</label>
        <input id="Poster" required />

        <label for="Metascore">Metascore</label>
        <input id="Metascore" type="number" required />

        <label for="imdbRating">IMDb Rating</label>
        <input id="imdbRating" type="number" step="0.1" required />

        <div class="button-row">
          <button type="button" id="saveButton">Save</button>
          <button type="button" id="cancelButton">Cancel</button>
        </div>
      </form>
    </main>
  </body>
</html>
